<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandGPT - 餐饮品牌咨询顾问</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-morphism { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        
        .chat-container { 
            max-height: 60vh; 
            min-height: 200px;
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
        }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .loading-shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">

<div id="app" class="max-w-5xl mx-auto px-4 py-6">
    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-orange-600 to-red-600">BrandGPT 顾问模式（餐饮版）</h1>
            <p class="text-slate-500 text-sm">初创餐饮品牌0-1定位专家系统</p>
        </div>
        <div class="flex space-x-2">
            <button id="aiDeepAnalysisBtn" class="hidden px-3 py-1.5 bg-gradient-to-r from-orange-600 to-red-600 text-white text-sm rounded-lg hover:opacity-90 transition flex items-center gap-2 shadow-sm">
                ✨ 生成餐饮诊断报告
            </button>
            <button id="exportPPTBtn" class="hidden px-3 py-1.5 bg-slate-800 text-white text-sm rounded-lg hover:bg-slate-700 transition flex items-center gap-1">
                <i data-lucide="presentation" class="w-4 h-4"></i> PPT
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-5 items-start">
        <div class="md:col-span-1 space-y-4">
            <div class="glass-morphism p-5 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="font-semibold mb-3 text-sm flex items-center gap-2">
                    <i data-lucide="utensils" class="text-orange-500 w-4 h-4"></i> 餐饮诊断进度
                </h3>
                <div class="space-y-3" id="progressList">
                    <div class="progress-step flex items-center gap-3 text-orange-600 font-medium text-sm">
                        <div class="step-icon w-5 h-5 rounded-full bg-orange-100 flex items-center justify-center text-[10px]">1</div>
                        <span>品类赛道与招牌产品</span>
                    </div>
                    <div class="progress-step flex items-center gap-3 text-slate-400 text-sm">
                        <div class="step-icon w-5 h-5 rounded-full bg-slate-100 flex items-center justify-center text-[10px]">2</div>
                        <span>商圈选址与消费场景</span>
                    </div>
                    <div class="progress-step flex items-center gap-3 text-slate-400 text-sm">
                        <div class="step-icon w-5 h-5 rounded-full bg-slate-100 flex items-center justify-center text-[10px]">3</div>
                        <span>品牌性格与视觉调性</span>
                    </div>
                    <div class="progress-step flex items-center gap-3 text-slate-400 text-sm">
                        <div class="step-icon w-5 h-5 rounded-full bg-slate-100 flex items-center justify-center text-[10px]">4</div>
                        <span>定价模型与单店盈利</span>
                    </div>
                </div>
            </div>

            <div class="bg-orange-50 p-5 rounded-2xl border border-orange-100">
                <h4 class="text-orange-900 font-semibold text-sm mb-1">资深顾问提示</h4>
                <p id="advisorHint" class="text-orange-700 text-xs leading-relaxed">餐饮本质是“复购”。请重点思考你的招牌菜如何让顾客吃第一次就记住。</p>
            </div>
        </div>

        <div class="md:col-span-2 flex flex-col glass-morphism rounded-2xl shadow-md overflow-hidden border border-white">
            <div id="chatBox" class="chat-container p-5 space-y-4">
                <div class="flex gap-3 fade-in">
                    <div class="w-8 h-8 rounded-full bg-orange-600 flex-shrink-0 flex items-center justify-center text-white">
                        <i data-lucide="chef-hat" class="w-4 h-4"></i>
                    </div>
                    <div class="bg-white p-3.5 rounded-2xl rounded-tl-none border border-slate-100 shadow-sm max-w-[90%]">
                        <p class="text-slate-800 text-sm leading-relaxed">
                            你好，餐饮创业者！我是你的专属品牌顾问。在当前极卷的餐饮市场，定位决定生死。
                            <br><br>
                            <b>第一阶段，我们聊聊产品核心：</b><br>
                            你准备做哪个细分品类（如川菜、新中式点心、精品简餐）？你的“钩子产品”（招牌菜）是什么？它解决了用户什么未被满足的味觉需求？
                        </p>
                    </div>
                </div>
            </div>

            <div class="p-3 border-t border-slate-50 bg-white/50">
                <div class="flex gap-2">
                    <textarea id="userInput" rows="5" class="flex-1 p-2.5 text-sm border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:outline-none resize-none bg-white" placeholder="请输入你的回答..."></textarea>
                    <button id="sendBtn" class="px-5 py-2 bg-orange-600 text-white text-sm font-medium rounded-xl hover:bg-orange-700 transition flex-shrink-0 self-end">
                        发送信息
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="reportSection" class="hidden mt-8 bg-white p-8 rounded-3xl shadow-xl border border-slate-100 fade-in">
        <div class="flex flex-col md:flex-row justify-between items-start gap-4 mb-8">
            <div>
                <h2 class="text-2xl font-bold text-slate-900">✨ 餐饮品牌战略诊断书</h2>
                <p class="text-slate-500 text-sm mt-1">基于 2025 餐饮行业趋势生成的专属定位建议</p>
            </div>
            <div class="flex gap-2">
                <button id="copyReportBtn" class="px-4 py-2 bg-slate-100 text-slate-700 text-xs font-semibold rounded-lg hover:bg-slate-200 transition shadow-sm flex items-center gap-2">
                    <i data-lucide="copy" class="w-4 h-4"></i> 复制报告
                </button>
            </div>
        </div>
        
        <div id="aiAnalysisLoader" class="hidden space-y-3 mb-6">
            <div class="h-6 w-1/4 loading-shimmer rounded"></div>
            <div class="h-20 w-full loading-shimmer rounded"></div>
        </div>

        <div id="reportContent" class="prose prose-sm prose-slate max-w-none"></div>
    </div>
</div>

<script>
    lucide.createIcons();

    const apiKey = ""; 
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const progressList = document.getElementById('progressList');
    const aiDeepAnalysisBtn = document.getElementById('aiDeepAnalysisBtn');
    const exportPPTBtn = document.getElementById('exportPPTBtn');
    const copyReportBtn = document.getElementById('copyReportBtn');

    let currentStep = 0;
    let lastGeneratedMarkdown = "";
    const sessionData = { market: "", scenario: "", identity: "", business: "" };

    const questions = [
        "选址与场景：你的理想位置在哪里（商场/写字楼/社区）？顾客是来解决午休快餐、社交聚会，还是家庭聚餐？",
        "品牌调性：如果你是一间店，你是温馨的邻家感、高冷的工业风，还是热闹的市井气？你的Slogan准备传递什么情绪值？",
        "盈利逻辑：你的客单价预设是多少？你准备靠规模化（快周转）赚钱，还是靠高溢价（好体验）赚钱？"
    ];

    const hints = [
        "餐饮是选址的艺术。明确场景才能确定装修和动线。",
        "视觉就是食欲。2025年，'出片率'也是餐饮的一种生产力。",
        "毛利、翻台率、外卖占比，这三个数决定了你能不能活过前三个月。"
    ];

    async function callGemini(prompt, systemInstruction = "") {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: systemInstruction }] }
        };
        for (let i = 0; i < 5; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (err) {
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
        }
        throw new Error("API 调用失败");
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `flex gap-3 fade-in ${role === 'user' ? 'flex-row-reverse' : ''}`;
        const iconName = role === 'ai' ? 'chef-hat' : 'user';
        const bgColor = role === 'ai' ? 'bg-orange-600' : 'bg-slate-800';
        div.innerHTML = `
            <div class="w-8 h-8 rounded-full ${bgColor} flex-shrink-0 flex items-center justify-center text-white">
                <i data-lucide="${iconName}" class="w-4 h-4"></i>
            </div>
            <div class="${role === 'user' ? 'bg-orange-50 text-slate-800' : 'bg-white text-slate-800'} p-3.5 rounded-2xl ${role === 'ai' ? 'rounded-tl-none' : 'rounded-tr-none'} border border-slate-100 shadow-sm max-w-[90%]">
                <p class="text-sm leading-relaxed">${text.replace(/\n/g, '<br>')}</p>
            </div>
        `;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        lucide.createIcons();
    }

    function updateProgress() {
        const steps = progressList.querySelectorAll('.progress-step');
        const hintEl = document.getElementById('advisorHint');
        steps.forEach((step, index) => {
            const icon = step.querySelector('.step-icon');
            if (index <= currentStep) {
                step.classList.remove('text-slate-400');
                step.classList.add('text-orange-600', 'font-medium');
                icon.classList.remove('bg-slate-100');
                icon.classList.add('bg-orange-100');
            }
        });
        if (hints[currentStep]) hintEl.innerText = hints[currentStep];
    }

    async function handleSend() {
        const val = userInput.value.trim();
        if (!val) return;
        appendMessage('user', val);
        userInput.value = "";
        const keys = Object.keys(sessionData);
        sessionData[keys[currentStep]] = val;
        
        if (currentStep < questions.length) {
            setTimeout(() => {
                appendMessage('ai', `收到。下一阶段思考：\n\n${questions[currentStep]}`);
                currentStep++;
                updateProgress();
            }, 600);
        } else {
            finishConsultation();
        }
    }

    function finishConsultation() {
        appendMessage('ai', "核心信息收集完毕！我已经梳理出了一套适合小型餐饮品牌的定位模型。点击上方按钮获取深度诊断报告。");
        aiDeepAnalysisBtn.classList.remove('hidden');
        exportPPTBtn.classList.remove('hidden');
    }

    aiDeepAnalysisBtn.onclick = async () => {
        const reportSection = document.getElementById('reportSection');
        const loader = document.getElementById('aiAnalysisLoader');
        const content = document.getElementById('reportContent');
        reportSection.classList.remove('hidden');
        loader.classList.remove('hidden');
        content.innerHTML = "";
        reportSection.scrollIntoView({ behavior: 'smooth' });
        
        const prompt = `
        作为500强餐饮品牌顾问，分析以下初创项目：
        1. 品类与产品：${sessionData.market}
        2. 场景与选址：${sessionData.scenario}
        3. 调性与品牌：${sessionData.identity}
        4. 盈利与定价：${sessionData.business}
        
        请输出一份结构清晰的定位报告，包含：
        - 市场空白点挖掘
        - 招牌产品记忆点建议
        - 针对2025市场的运营红利
        - 差异化竞争策略（特别是针对初创小品牌）
        `;
        
        try {
            const res = await callGemini(prompt, "你是顶级餐饮品牌咨询师。请用专业的商业结构输出Markdown报告。");
            lastGeneratedMarkdown = res;
            loader.classList.add('hidden');
            // 简单的 Markdown 渲染增强
            content.innerHTML = res
                .replace(/### (.*)/g, '<h3 class="text-lg font-bold mt-4 mb-2 text-orange-700">$1</h3>')
                .replace(/## (.*)/g, '<h2 class="text-xl font-bold mt-6 mb-3 text-slate-800 border-b pb-1">$1</h2>')
                .replace(/\n\n/g, '<br><br>')
                .replace(/- (.*)/g, '<li class="ml-4 text-slate-700">$1</li>');
        } catch (e) { 
            loader.innerText = "生成失败，请检查网络后重试。"; 
        }
    };

    copyReportBtn.onclick = () => {
        if (!lastGeneratedMarkdown) return;
        
        const tempTextArea = document.createElement("textarea");
        tempTextArea.value = lastGeneratedMarkdown;
        document.body.appendChild(tempTextArea);
        tempTextArea.select();
        try {
            document.execCommand('copy');
            const originalText = copyReportBtn.innerHTML;
            copyReportBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-500"></i> 已复制内容';
            lucide.createIcons();
            setTimeout(() => {
                copyReportBtn.innerHTML = originalText;
                lucide.createIcons();
            }, 2000);
        } catch (err) {
            console.error('无法复制', err);
        }
        document.body.removeChild(tempTextArea);
    };

    sendBtn.addEventListener('click', handleSend);
</script>
</body>
</html>
